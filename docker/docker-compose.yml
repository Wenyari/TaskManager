version: '3.8'

services:
  database:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  backend:
    build: 
      context: ..
      dockerfile: docker/backend.Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - database

  frontend:
    build:
      context: ..
      dockerfile: docker/frontend.Dockerfile
    ports:
      - "80:80"

volumes:
  mongo-data:
